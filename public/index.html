<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Academica PRG2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <!-- Pantalla inicial: formulario de autenticacion contra la base de datos. -->
    <section id="loginPanel" class="login-panel">
      <form id="loginForm" class="login-box">
        <p class="eyebrow">Programacion 2</p>
        <h1>Gestion Academica</h1>
        <label>Usuario <input name="usuario" autocomplete="username" required></label>
        <label>Contrasena <input name="clave" type="password" autocomplete="current-password" required></label>
        <button type="submit">Ingresar</button>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </section>

    <!-- Contenedor principal de la aplicacion. Se muestra solo despues del login. -->
    <section id="appPanel" class="app-panel hidden">
      <!-- Menu lateral: permite navegar entre las vistas sin recargar la pagina. -->
      <aside class="sidebar">
        <div>
          <p class="eyebrow">PRG2</p>
          <h2>Academico</h2>
        </div>
        <nav>
          <button class="nav-link active" data-view="dashboard">Dashboard</button>
          <button class="nav-link" data-view="alumnos">Alumnos</button>
          <button class="nav-link" data-view="materias">Materias</button>
          <button class="nav-link" data-view="inscripciones">Inscripciones</button>
          <button class="nav-link" data-view="reportes">Reportes</button>
        </nav>
        <button id="logoutBtn" class="secondary">Salir</button>
      </aside>

      <!-- Area de trabajo: aqui se renderizan dashboard, formularios, tablas y reportes. -->
      <section class="content">
        <!-- Barra superior con usuario activo y accion para refrescar datos desde Oracle. -->
        <header class="topbar">
          <div>
            <p id="userName" class="eyebrow"></p>
            <h1 id="viewTitle">Dashboard</h1>
          </div>
          <button id="refreshBtn" class="secondary">Actualizar</button>
        </header>

        <!-- Dashboard: metricas y graficos alimentados por /api/resumen. -->
        <section id="dashboard" class="view active">
          <div class="metrics">
            <article><span>Alumnos</span><strong id="metricAlumnos">0</strong></article>
            <article><span>Materias</span><strong id="metricMaterias">0</strong></article>
            <article><span>Inscripciones</span><strong id="metricInscripciones">0</strong></article>
            <article><span>Promedio</span><strong id="metricPromedio">0</strong></article>
          </div>
          <div class="charts">
            <article>
              <h3>Inscripciones por materia</h3>
              <canvas id="materiaChart" width="640" height="260"></canvas>
            </article>
            <article>
              <h3>Estados</h3>
              <canvas id="estadoChart" width="420" height="260"></canvas>
            </article>
          </div>
        </section>

        <!-- Vista de alumnos: filtro, formulario CRUD y tabla de resultados. -->
        <section id="alumnos" class="view">
          <input class="table-filter" data-filter-target="alumnosTable" placeholder="Filtrar alumnos">
          <form id="alumnoForm" class="data-form">
            <input type="hidden" name="id">
            <input name="nombre" placeholder="Nombre completo" required>
            <input name="documento" placeholder="Documento" required>
            <input name="email" type="email" placeholder="Email">
            <input name="telefono" placeholder="Telefono">
            <button type="submit">Guardar</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Nombre</th><th>Documento</th><th>Email</th><th>Telefono</th><th></th></tr></thead>
              <tbody id="alumnosTable"></tbody>
            </table>
          </div>
        </section>

        <!-- Vista de materias: registra y lista las materias disponibles. -->
        <section id="materias" class="view">
          <input class="table-filter" data-filter-target="materiasTable" placeholder="Filtrar materias">
          <form id="materiaForm" class="data-form">
            <input name="nombre" placeholder="Materia" required>
            <input name="codigo" placeholder="Codigo" required>
            <input name="creditos" type="number" min="0" placeholder="Creditos">
            <button type="submit">Guardar</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Materia</th><th>Codigo</th><th>Creditos</th><th></th></tr></thead>
              <tbody id="materiasTable"></tbody>
            </table>
          </div>
        </section>

        <!-- Vista de inscripciones: relaciona alumnos con materias y registra estado/nota. -->
        <section id="inscripciones" class="view">
          <input class="table-filter" data-filter-target="inscripcionesTable" placeholder="Filtrar inscripciones">
          <form id="inscripcionForm" class="data-form">
            <select name="alumnoId" required></select>
            <select name="materiaId" required></select>
            <select name="estado">
              <option value="CURSANDO">Cursando</option>
              <option value="APROBADO">Aprobado</option>
              <option value="REPROBADO">Reprobado</option>
            </select>
            <input name="nota" type="number" min="1" max="5" step="0.01" placeholder="Nota">
            <button type="submit">Guardar</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Alumno</th><th>Materia</th><th>Estado</th><th>Nota</th><th>Fecha</th><th></th></tr></thead>
              <tbody id="inscripcionesTable"></tbody>
            </table>
          </div>
        </section>

        <!-- Vista de reportes: permite imprimir o descargar datos reales en CSV. -->
        <section id="reportes" class="view">
          <div class="report-actions">
            <button id="downloadCsv">Descargar CSV</button>
            <button id="printReport" class="secondary">Imprimir</button>
          </div>
          <div id="reportPreview" class="report-preview"></div>
        </section>

        <!-- Mensajes generales de exito/error para acciones realizadas en la app. -->
        <p id="appMessage" class="message" role="status"></p>
      </section>
    </section>
  </main>
  <!-- Logica del frontend: login, fetch a la API, renderizado y graficos. -->
  <script src="app.js"></script>
</body>
</html>
